<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <style>
        /* Design simple, épuré et élégant */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f9fc; /* Gris très clair, doux pour les yeux */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Ombre très douce */
            width: 100%;
            max-width: 400px;
            /* La petite touche stylée : une ligne colorée en haut de la carte */
            border-top: 5px solid #20c997; 
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
        }
        label {
            font-size: 12px;
            text-transform: uppercase; /* Texte en majuscules pour le style */
            letter-spacing: 1px;
            color: #7f8c8d;
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #e1e8ed;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #fcfcfc;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #20c997; /* La bordure devient menthe quand on clique */
            background-color: #fff;
        }
        button {
            background-color: #2c3e50; /* Bouton gris anthracite très chic */
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Contactez-moi</h2>
        <form>
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Votre message..." required></textarea>

            <button type="button">Envoyer</button>
        </form>
    </div>
</body>
</html>
