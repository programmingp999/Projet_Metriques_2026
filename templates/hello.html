<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Atelier Métriques</title>
    <style>
        /* Fond de la page gris très clair pour faire ressortir la carte */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* La carte blanche au centre avec une petite ombre */
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        /* Style de tes titres */
        h1 {
            color: #2c3e50; /* Bleu marine très foncé */
            margin-bottom: 5px;
        }
        h2 {
            color: #7f8c8d; /* Gris élégant */
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 30px;
        }
        /* Conteneur pour espacer les boutons */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* Style des jolis boutons bleus */
        .btn {
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.2s; /* Animation douce au survol */
        }
        .btn:hover {
            background-color: #2980b9; /* Bleu plus foncé quand on passe la souris */
        }
        /* Bouton gris pour les données brutes (API) */
        .btn-gris {
            background-color: #95a5a6;
        }
        .btn-gris:hover {
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ATELIER MÉTRIQUES</h1>
        <h2>Nom Prénom : AZERKANE Ahmed</h2>

        <div class="menu">
            <a href="/rapport" class="btn">📈 Courbe (Températures Paris)</a>
            <a href="/histogramme" class="btn">📊 Histogramme (Températures Paris)</a>
            <a href="/atelier" class="btn">🌧️ Atelier (Pluie Amsterdam)</a>
            <a href="/contact" class="btn">✉️ Page de contact</a>
            <a href="/paris" class="btn btn-gris">⚙️ Données JSON (API Paris)</a>
        </div>
    </div>

</body>
</html>
